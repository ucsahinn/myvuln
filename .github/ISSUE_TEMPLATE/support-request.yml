name: Public-safe support request
description: Ask for help without sharing sensitive data.
title: "[Support]: "
labels: ["support", "public-safe"]
body:
  - type: markdown
    attributes:
      value: |
        Keep support requests public-safe. For security issues, use SECURITY.md and do not post details here.
  - type: input
    id: area
    attributes:
      label: Area
      description: Example: docs, onboarding, API v1, alerting, exports, reports.
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe what you need with sanitized, non-sensitive information.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, vulnerability details, tenant data, customer data, production logs, screenshots with sensitive content, internal URLs, or private source code.
          required: true
